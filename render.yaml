services:
  - type: web
    name: mern-stack-backend
    env: node
    repo: https://github.com/Gayatri-Preeti/MERN-Stack.git
    rootDir: Backend
    buildCommand: "npm install"
    startCommand: "node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
    plan: free
